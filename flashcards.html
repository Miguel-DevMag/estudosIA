<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .flashcard-container {
      display: flex;
      gap: 15px;
      align-items: center;
      justify-content: center;
      margin: 20px 0;
    }
    .flashcard-nav {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--text);
    }
    .flashcard-nav:hover {
      background: rgba(124, 92, 255, .12);
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><img src="img/logo.png" alt="logo">EstudosIA</div>
    <nav class="nav">
      <a href="index.html"><img src="img/dashboard.png" alt="Dashboard">Dashboard</a>
      <a href="resumo.html"><img src="img/document.png" alt="Resumo">Resumo</a>
      <a href="perguntas.html"><img src="img/file.png" alt="Perguntas">Perguntas</a>
      <a class="active" href="flashcards.html"><img src="img/flash-cards.png" alt="Flashcards">Flashcards</a>
      <a href="historico.html"><img src="img/file.png" alt="Histórico">Histórico</a>
      <div class="nav-bottom">
        <a href="configuracao.html"><img src="img/setting.png" alt="Configuração">Configuração</a>
        <a href="#" class="theme-btn" onclick="toggleTheme()"><img id="theme-icon" src="img/night-mode.png" alt="Tema"><span id="theme-text">Dark</span></a>
      </div>
    </nav>
  </aside>

  <main class="main">
    <div class="header">
      <div class="title">Flashcards</div>
      <button class="btn secondary" onclick="toggleMenu()">Menu</button>
    </div>

    <div class="card">
      <h3>Seus Flashcards</h3>
      <div id="flash" data-s="q" class="card flash" onclick="flip()" style="margin-top: 20px; cursor: pointer;">
        Clique para começar → Use o Dashboard para gerar flashcards
      </div>
      <div class="flashcard-container" id="navButtons" style="display: none;">
        <button class="flashcard-nav" onclick="prevCard()">← Anterior</button>
        <span id="cardCounter" style="color: var(--muted);">0 / 0</span>
        <button class="flashcard-nav" onclick="nextCard()">Próximo →</button>
      </div>
      <div id="cardsList" style="margin-top: 20px;"></div>
      <button class="btn" onclick="resetFlashcards()" style="margin-top: 15px; width: 100%;">Reiniciar</button>
    </div>

    <div class="card" style="margin-top: 20px;">
      <h3>Histórico</h3>
      <ul id="hist" class="list"></ul>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
