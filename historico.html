<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><img src="img/logo.png" alt="logo">EstudosIA</div>
    <nav class="nav">
      <a href="index.html"><img src="img/dashboard.png" alt="Dashboard">Dashboard</a>
      <a href="resumo.html"><img src="img/document.png" alt="Resumo">Resumo</a>
      <a href="perguntas.html"><img src="img/file.png" alt="Perguntas">Perguntas</a>
      <a href="flashcards.html"><img src="img/flash-cards.png" alt="Flashcards">Flashcards</a>
      <a class="active" href="historico.html"><img src="img/file.png" alt="Histórico">Histórico</a>
      <div class="nav-bottom">
        <a href="configuracao.html"><img src="img/setting.png" alt="Configuração">Configuração</a>
        <a href="#" class="theme-btn" onclick="toggleTheme()"><img id="theme-icon" src="img/night-mode.png" alt="Tema"><span id="theme-text">Dark</span></a>
      </div>
    </nav>
  </aside>

  <main class="main">
    <div class="header">
      <div class="title">Histórico de Atividades</div>
      <button class="btn secondary" onclick="toggleMenu()">Menu</button>
    </div>

    <div class="card">
      <h3>Últimas Gerações</h3>
      <ul id="hist" class="list"></ul>
      <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button class="btn secondary" onclick="limparHistorico()" style="flex: 1;">🗑️ Limpar Histórico</button>
        <button class="btn secondary btn-danger" onclick="limparTudo()" style="flex: 1;">⚠️ Limpar Tudo</button>
      </div>
    </div>

    <div class="card" style="margin-top: 20px;">
      <h3>Materiais Salvos</h3>
      <ul id="materiais" class="list"></ul>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    function limparHistorico(){
      if(confirm('Tem certeza que deseja limpar o histórico?')){
        localStorage.removeItem('bf_hist');
        document.getElementById('hist').innerHTML = '<li style="color: var(--muted);">Histórico vazio</li>';
        alert('Histórico limpo com sucesso!');
        location.reload();
      }
    }

    function limparTudo(){
      if(confirm('⚠️ AVISO: Isso vai limpar TODOS os dados! Tem certeza?')){
        localStorage.clear();
        alert('Todos os dados foram limpos');
        location.reload();
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      renderHistory();
      const materials = JSON.parse(localStorage.getItem('estudos_materiais') || '[]');
      const matList = document.getElementById('materiais');
      if(materials.length === 0){
        matList.innerHTML = '<li style="color: var(--muted);">Nenhum material salvo</li>';
      } else {
        matList.innerHTML = materials.map((m, i) => `<li style="display: flex; justify-content: space-between; align-items: center; padding: 8px; border-radius: 4px;"><span style="flex: 1;"><strong>Material ${i + 1}</strong> — ${m.created}<br/><small>${m.text.substring(0, 100)}...</small></span><button onclick="deleteMaterial(${i})" style="margin-left: 10px; padding: 4px 8px; background: #ff4757; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap;">🗑️</button></li>`).join('');
      }
    });
  </script>
</body>
</html>
